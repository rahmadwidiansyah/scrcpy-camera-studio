name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ] # Jalankan otomatis saat push ke branch main/master
  workflow_dispatch: # Memungkinkan kamu menjalankan build secara manual dari web GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.6' # Sesuaikan dengan versi Python yang kamu gunakan

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed `
        --add-data "assets;assets" `
        --add-data "bin;bin" `
        --name "CameraStudio" `
        main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CameraStudio-Windows
        path: dist/CameraStudio.exe