name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# ── Shared env ────────────────────────────────────────────────────
env:
  APP_NAME: SCRCPYCameraStudio
  PYTHON_VERSION: '3.12'

jobs:
  # ==============================================================
  # JOB 0: Extract version from source of truth (config/version.py)
  # ==============================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag:     ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from config/version.py
        id: extract
        run: |
          VERSION=$(python -c "import sys; sys.path.insert(0,'config'); from version import VersionManager; print(VersionManager.CURRENT_VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

  # ==============================================================
  # JOB 1: BUILD WINDOWS x64
  # ==============================================================
  build-windows:
    needs: get-version
    runs-on: windows-latest
    env:
      ARTIFACT_NAME: CameraStudio-v${{ needs.get-version.outputs.version }}-win64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject build metadata
        shell: python
        run: |
          import subprocess, datetime, pathlib
          commit  = subprocess.check_output(['git','rev-parse','--short','HEAD'],text=True).strip()
          branch  = subprocess.check_output(['git','rev-parse','--abbrev-ref','HEAD'],text=True).strip()
          content = f"""# Auto-generated by CI. Do not edit manually.
          BUILD_DATE     = "{datetime.datetime.utcnow().isoformat()}"
          BUILD_COMMIT   = "{commit}"
          BUILD_BRANCH   = "{branch}"
          BUILD_PLATFORM = "Windows x64"
          IS_DIRTY       = False
          """
          pathlib.Path('config/build_info.py').write_text('\n'.join(l.lstrip() for l in content.strip().splitlines()))

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "assets;assets" `
            --add-data "config;config" `
            --add-data "services;services" `
            --add-data "updater;updater" `
            --add-data "runtime;runtime" `
            --add-data "icon;icon" `
            --icon "icon\app.ico" `
            --name "${{ env.APP_NAME }}" `
            main.py
        continue-on-error: false

      - name: Package artifact (zip with runtime)
        run: |
          $ART = "${{ env.ARTIFACT_NAME }}"
          New-Item -ItemType Directory -Path "release\$ART" -Force
          Copy-Item "dist\${{ env.APP_NAME }}.exe" "release\$ART\"
          # Bundle the runtime binaries (scrcpy, adb, dlls) alongside the exe
          if (Test-Path "runtime") {
            Copy-Item -Recurse "runtime" "release\$ART\runtime"
          }
          if (Test-Path "icon") {
            Copy-Item -Recurse "icon" "release\$ART\icon"
          }
          Compress-Archive -Path "release\$ART\*" `
            -DestinationPath "release\${ART}.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/${{ env.ARTIFACT_NAME }}.zip

  # ==============================================================
  # JOB 2: BUILD LINUX x64
  # ==============================================================
  build-linux-x64:
    needs: get-version
    runs-on: ubuntu-latest
    env:
      ARTIFACT_NAME: CameraStudio-v${{ needs.get-version.outputs.version }}-linux-x64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk tk-dev \
            libglib2.0-0 libglib2.0-dev \
            libdbus-1-3 \
            libx11-6 libxext6 libxrender1 libxtst6 \
            libfontconfig1 libfreetype6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject build metadata
        run: |
          python - <<'EOF'
          import subprocess, datetime, pathlib
          commit  = subprocess.check_output(['git','rev-parse','--short','HEAD'],text=True).strip()
          branch  = subprocess.check_output(['git','rev-parse','--abbrev-ref','HEAD'],text=True).strip()
          content = f"""# Auto-generated by CI. Do not edit manually.
          BUILD_DATE     = "{datetime.datetime.utcnow().isoformat()}"
          BUILD_COMMIT   = "{commit}"
          BUILD_BRANCH   = "{branch}"
          BUILD_PLATFORM = "Linux x64"
          IS_DIRTY       = False
          """
          pathlib.Path('config/build_info.py').write_text('\n'.join(l.lstrip() for l in content.strip().splitlines()))
          EOF

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --windowed \
            --add-data "assets:assets" \
            --add-data "config:config" \
            --add-data "services:services" \
            --add-data "updater:updater" \
            --add-data "icon:icon" \
            --name "${{ env.APP_NAME }}" \
            main.py

      - name: Package artifact (tar.gz)
        run: |
          mkdir -p release
          # Create a staging directory with the binary + assets
          mkdir -p staging
          cp "dist/${{ env.APP_NAME }}" staging/
          if [ -d "icon" ]; then cp -r icon staging/; fi
          tar -czf "release/${{ env.ARTIFACT_NAME }}.tar.gz" \
            -C staging .

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/${{ env.ARTIFACT_NAME }}.tar.gz

  # ==============================================================
  # JOB 3: BUILD LINUX arm64
  # ==============================================================
  build-linux-arm64:
    needs: get-version
    runs-on: ubuntu-24.04-arm
    env:
      ARTIFACT_NAME: CameraStudio-v${{ needs.get-version.outputs.version }}-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk tk-dev \
            libglib2.0-0 libglib2.0-dev \
            libdbus-1-3 \
            libx11-6 libxext6 libxrender1 libxtst6 \
            libfontconfig1 libfreetype6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject build metadata
        run: |
          python - <<'EOF'
          import subprocess, datetime, pathlib
          commit  = subprocess.check_output(['git','rev-parse','--short','HEAD'],text=True).strip()
          branch  = subprocess.check_output(['git','rev-parse','--abbrev-ref','HEAD'],text=True).strip()
          content = f"""# Auto-generated by CI. Do not edit manually.
          BUILD_DATE     = "{datetime.datetime.utcnow().isoformat()}"
          BUILD_COMMIT   = "{commit}"
          BUILD_BRANCH   = "{branch}"
          BUILD_PLATFORM = "Linux arm64"
          IS_DIRTY       = False
          """
          pathlib.Path('config/build_info.py').write_text('\n'.join(l.lstrip() for l in content.strip().splitlines()))
          EOF

      - name: Build Linux arm64 binary
        run: |
          pyinstaller --onefile --windowed \
            --add-data "assets:assets" \
            --add-data "config:config" \
            --add-data "services:services" \
            --add-data "updater:updater" \
            --add-data "icon:icon" \
            --name "${{ env.APP_NAME }}" \
            main.py

      - name: Package artifact (tar.gz)
        run: |
          mkdir -p release staging
          cp "dist/${{ env.APP_NAME }}" staging/
          if [ -d "icon" ]; then cp -r icon staging/; fi
          tar -czf "release/${{ env.ARTIFACT_NAME }}.tar.gz" \
            -C staging .

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/${{ env.ARTIFACT_NAME }}.tar.gz

  # ==============================================================
  # JOB 4: BUILD macOS arm64 (Apple Silicon)
  # ==============================================================
  build-macos-arm64:
    needs: get-version
    runs-on: macos-latest
    env:
      ARTIFACT_NAME: CameraStudio-v${{ needs.get-version.outputs.version }}-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject build metadata
        run: |
          python - <<'EOF'
          import subprocess, datetime, pathlib
          commit  = subprocess.check_output(['git','rev-parse','--short','HEAD'],text=True).strip()
          branch  = subprocess.check_output(['git','rev-parse','--abbrev-ref','HEAD'],text=True).strip()
          content = f"""# Auto-generated by CI. Do not edit manually.
          BUILD_DATE     = "{datetime.datetime.utcnow().isoformat()}"
          BUILD_COMMIT   = "{commit}"
          BUILD_BRANCH   = "{branch}"
          BUILD_PLATFORM = "macOS arm64"
          IS_DIRTY       = False
          """
          pathlib.Path('config/build_info.py').write_text('\n'.join(l.lstrip() for l in content.strip().splitlines()))
          EOF

      - name: Build macOS binary
        run: |
          pyinstaller --onefile --windowed \
            --add-data "assets:assets" \
            --add-data "config:config" \
            --add-data "services:services" \
            --add-data "updater:updater" \
            --add-data "icon:icon" \
            --name "${{ env.APP_NAME }}" \
            main.py

      - name: Package artifact (zip)
        run: |
          mkdir -p release staging
          cp "dist/${{ env.APP_NAME }}" staging/
          if [ -d "icon" ]; then cp -r icon staging/; fi
          cd staging
          zip -r "../release/${{ env.ARTIFACT_NAME }}.zip" .

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/${{ env.ARTIFACT_NAME }}.zip

  # ==============================================================
  # JOB 5: CREATE GITHUB RELEASE
  # ==============================================================
  release:
    name: Create GitHub Release
    needs:
      - get-version
      - build-windows
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Generate checksums.txt
        run: |
          cd release
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) | sort | while read f; do
            sha256sum "$f"
          done > checksums.txt
          cat checksums.txt

      - name: Flatten release directory
        run: |
          mkdir -p flat
          find release -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} flat/ \;
          cp release/checksums.txt flat/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}
          name:     "Camera Studio ${{ needs.get-version.outputs.tag }}"
          body: |
            ## Camera Studio ${{ needs.get-version.outputs.tag }}
            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `CameraStudio-v${{ needs.get-version.outputs.version }}-win64.zip` |
            | Linux x64   | `CameraStudio-v${{ needs.get-version.outputs.version }}-linux-x64.tar.gz` |
            | Linux arm64 | `CameraStudio-v${{ needs.get-version.outputs.version }}-linux-arm64.tar.gz` |
            | macOS arm64 | `CameraStudio-v${{ needs.get-version.outputs.version }}-macos-arm64.zip` |

            ### Verification
            Verify file integrity using `checksums.txt` (SHA-256).
          files: |
            flat/*.zip
            flat/*.tar.gz
            flat/checksums.txt
          draft: false
          prerelease: false